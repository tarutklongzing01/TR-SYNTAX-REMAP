<main>
    <section class="auth-wrap">
        <form class="auth-card" data-firebase-register data-firebase-form>
            <span class="eyebrow">Create Account</span>
            <h1>สมัครสมาชิก</h1>
            <label>ชื่อผู้ใช้<input type="text" name="username" required></label>
            <label>อีเมล<input type="email" name="email" required></label>
            <label>รหัสผ่าน<input type="password" name="password" minlength="8" required></label>
            <label>ยืนยันรหัสผ่าน<input type="password" name="confirm_password" minlength="8" required></label>
            <button class="btn primary full" type="submit">สร้างบัญชี</button>
            <p class="muted">มีบัญชีแล้ว? <a href="login.html">เข้าสู่ระบบ</a></p>
        </form>
    </section>
</main>
